<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 272 430">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#1e0b35"/>
      <stop offset="100%" stop-color="#050210"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="4"  cy="7"  r="0.7" fill="#d4af37" opacity="0.35"/>
      <circle cx="18" cy="2"  r="0.5" fill="#d4af37" opacity="0.25"/>
      <circle cx="30" cy="14" r="0.6" fill="#fff"    opacity="0.18"/>
      <circle cx="10" cy="24" r="0.5" fill="#d4af37" opacity="0.28"/>
      <circle cx="26" cy="30" r="0.7" fill="#fff"    opacity="0.15"/>
      <circle cx="34" cy="4"  r="0.4" fill="#d4af37" opacity="0.22"/>
      <circle cx="2"  cy="32" r="0.5" fill="#d4af37" opacity="0.20"/>
    </pattern>
  </defs>

  <rect width="272" height="430" rx="18" fill="url(#bg)"/>
  <rect width="272" height="430" rx="18" fill="url(#dots)"/>

  <!-- Outer border -->
  <rect x="5" y="5" width="262" height="420" rx="14" fill="none" stroke="#d4af37" stroke-width="1.8" opacity="0.75"/>
  <!-- Inner border -->
  <rect x="12" y="12" width="248" height="406" rx="10" fill="none" stroke="#d4af37" stroke-width="0.7" opacity="0.35"/>

  <!-- Corner ornaments -->
  <g stroke="#d4af37" stroke-width="1.5" fill="none" opacity="0.65">
    <path d="M22,22 L40,22 M22,22 L22,40"/>
    <path d="M250,22 L232,22 M250,22 L250,40"/>
    <path d="M22,408 L40,408 M22,408 L22,390"/>
    <path d="M250,408 L232,408 M250,408 L250,390"/>
  </g>

  <!-- Decorative horizontal rules -->
  <line x1="46" y1="148" x2="226" y2="148" stroke="#d4af37" stroke-width="0.6" opacity="0.35"/>
  <line x1="46" y1="298" x2="226" y2="298" stroke="#d4af37" stroke-width="0.6" opacity="0.35"/>

  <!-- Center diamond -->
  <path d="M136,158 L162,193 L136,228 L110,193 Z" fill="none" stroke="#d4af37" stroke-width="0.8" opacity="0.35"/>

  <!-- Main emoji -->
  <text x="136" y="222" text-anchor="middle" dominant-baseline="middle" font-size="68" opacity="0.88">⚡</text>

  <!-- Title -->
  <text x="136" y="262" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#d4af37" letter-spacing="5" font-weight="bold" opacity="0.9">WESEN</text>
  <text x="136" y="282" text-anchor="middle" font-family="Georgia,serif" font-size="8.5" fill="#d4af37" letter-spacing="5" opacity="0.5">QUARTETT</text>
</svg>
